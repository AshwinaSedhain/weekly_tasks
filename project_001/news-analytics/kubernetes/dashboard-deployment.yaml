apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: news-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: your-dockerhub-username/news-analytics-dashboard:latest
          ports:
            - containerPort: 8050
          envFrom:
            - configMapRef:
                name: news-analytics-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
  namespace: news-analytics
spec:
  selector:
    app: dashboard
  ports:
    - port: 8050
      targetPort: 8050
  type: LoadBalancer
