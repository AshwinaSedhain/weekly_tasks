apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: news-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: your-dockerhub-username/news-analytics-airflow:latest
          command: ["airflow", "webserver"]
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: news-analytics-config
          env:
            - name: NEWSAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: news-analytics-secrets
                  key: NEWSAPI_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: news-analytics-secrets
                  key: POSTGRES_PASSWORD
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://newsuser:newspass@postgres-service/newsdb
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: airflow-service
  namespace: news-analytics
spec:
  selector:
    app: airflow-webserver
  ports:
    - port: 8080
      targetPort: 8080
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: news-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      containers:
        - name: airflow-scheduler
          image: your-dockerhub-username/news-analytics-airflow:latest
          command: ["airflow", "scheduler"]
          envFrom:
            - configMapRef:
                name: news-analytics-config
          env:
            - name: NEWSAPI_KEY
              valueFrom:
                secretKeyRef:
                  name: news-analytics-secrets
                  key: NEWSAPI_KEY
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: news-analytics-secrets
                  key: POSTGRES_PASSWORD
            - name: AIRFLOW__CORE__EXECUTOR
              value: LocalExecutor
            - name: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
              value: postgresql+psycopg2://newsuser:newspass@postgres-service/newsdb
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
