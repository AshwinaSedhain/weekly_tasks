x-db-env: &db-env
  DB_HOST:     postgres
  DB_PORT:     "5432"
  DB_NAME:     healthstream
  DB_USER:     healthstream
  DB_PASSWORD: healthstream123

x-kafka-env: &kafka-env
  KAFKA_BOOTSTRAP_SERVERS:      kafka:9092
  KAFKA_TOPIC_RAW_CLAIMS:       raw-claims
  KAFKA_TOPIC_VALIDATED_CLAIMS: validated-claims
  KAFKA_TOPIC_FRAUD_ALERTS:     fraud-alerts

networks:
  healthstream-net:
    driver: bridge

volumes:
  postgres-data:
  zookeeper-data:
  kafka-data:
  airflow-logs:
  airflow-plugins:

services:

  postgres:
    image: postgres:16-alpine
    container_name: healthstream-postgres
    environment:
      POSTGRES_DB:       healthstream
      POSTGRES_USER:     healthstream
      POSTGRES_PASSWORD: healthstream123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - healthstream-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthstream -d healthstream"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: healthstream-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - healthstream-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: healthstream-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
      KAFKA_LOG_RETENTION_HOURS:              24
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "29092:29092"
    networks:
      - healthstream-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: healthstream-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME:             healthstream
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER:        zookeeper:2181
    ports:
      - "8090:8080"
    networks:
      - healthstream-net

  kafka-init:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: healthstream-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      <<: *kafka-env
    command: ["python", "topics.py"]
    networks:
      - healthstream-net
    restart: "no"

  db-seeder:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    container_name: healthstream-db-seeder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: [*db-env, *kafka-env]
      NUM_PATIENTS: "200"
      NUM_HOSPITALS: "20"
    command: ["python", "db_seeder.py"]
    networks:
      - healthstream-net
    restart: "no"

  data-generator:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    container_name: healthstream-generator
    depends_on:
      kafka:
        condition: service_healthy
      db-seeder:
        condition: service_completed_successfully
    environment:
      <<: [*db-env, *kafka-env]
      BATCH_SIZE:          "30"
      GENERATION_INTERVAL: "3"
    networks:
      - healthstream-net
    restart: unless-stopped

  kafka-consumer:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: healthstream-consumer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      <<: *kafka-env
      FRAUD_THRESHOLD: "0.7"
    command: ["python", "consumer.py"]
    networks:
      - healthstream-net
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: healthstream-api
    depends_on:
      postgres:
        condition: service_healthy
      db-seeder:
        condition: service_completed_successfully
    environment:
      <<: *db-env
    ports:
      - "8000:8000"
    networks:
      - healthstream-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: healthstream-dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_BASE_URL:     http://api:8000
      REFRESH_INTERVAL: "30"
    ports:
      - "8501:8501"
    networks:
      - healthstream-net
    restart: unless-stopped

  airflow-init:
    build:
      context: ./docker
      dockerfile: airflow.Dockerfile
    image: healthstream-airflow:latest
    container_name: healthstream-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR:                    LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:        postgresql+psycopg2://healthstream:healthstream123@postgres/healthstream
      AIRFLOW__CORE__FERNET_KEY:                  ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES:               "false"
      _AIRFLOW_DB_MIGRATE:                        "true"
      _AIRFLOW_WWW_USER_CREATE:                   "true"
      _AIRFLOW_WWW_USER_USERNAME:                 admin
      _AIRFLOW_WWW_USER_PASSWORD:                 admin123
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin123 --firstname Admin --lastname User --role Admin --email admin@healthstream.com || true &&
        airflow connections add healthstream_postgres
          --conn-type postgres
          --conn-host postgres
          --conn-login healthstream
          --conn-password healthstream123
          --conn-schema healthstream
          --conn-port 5432 || true
      "
    networks:
      - healthstream-net
    restart: "no"

  airflow-webserver:
    build:
      context: ./docker
      dockerfile: airflow.Dockerfile
    image: healthstream-airflow:latest
    container_name: healthstream-airflow-web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:             LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://healthstream:healthstream123@postgres/healthstream
      AIRFLOW__CORE__FERNET_KEY:           ""
      AIRFLOW__CORE__LOAD_EXAMPLES:        "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: webserver
    networks:
      - healthstream-net
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./docker
      dockerfile: airflow.Dockerfile
    image: healthstream-airflow:latest
    container_name: healthstream-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR:             LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://healthstream:healthstream123@postgres/healthstream
      AIRFLOW__CORE__FERNET_KEY:           ""
      AIRFLOW__CORE__LOAD_EXAMPLES:        "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
      - airflow-plugins:/opt/airflow/plugins
    command: scheduler
    networks:
      - healthstream-net
    restart: unless-stopped
