---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthstream-api
  namespace: healthstream
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthstream-api
  template:
    metadata:
      labels:
        app: healthstream-api
    spec:
      containers:
        - name: api
          image: healthstream/api:latest
          imagePullPolicy: Always
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: healthstream
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: healthstream-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthstream-secrets
                  key: db-password
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: healthstream-api
  namespace: healthstream
spec:
  selector:
    app: healthstream-api
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: healthstream-api-ingress
  namespace: healthstream
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: api.healthstream.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: healthstream-api
                port:
                  number: 8000
