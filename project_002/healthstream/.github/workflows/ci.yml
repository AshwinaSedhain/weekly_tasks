name: Healthstream CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/healthstream

jobs:
  # ── Unit & Integration Tests ───────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       healthstream_test
          POSTGRES_USER:     healthstream
          POSTGRES_PASSWORD: healthstream123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install -r tests/requirements.txt
        working-directory: healthstream

      - name: Apply DB schema
        run: |
          PGPASSWORD=healthstream123 psql \
            -h localhost -U healthstream -d healthstream_test \
            -f database/schema.sql
        working-directory: healthstream

      - name: Run tests
        run: pytest tests/ -v --tb=short
        working-directory: healthstream
        env:
          DB_HOST:     localhost
          DB_NAME:     healthstream_test
          DB_USER:     healthstream
          DB_PASSWORD: healthstream123

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - name: Lint with ruff
        run: ruff check healthstream/ --ignore E501

  # ── Build Docker Images ────────────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: healthstream/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: healthstream/dashboard
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-dashboard:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push Data Generator image
        uses: docker/build-push-action@v5
        with:
          context: healthstream/data-generator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-generator:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max
