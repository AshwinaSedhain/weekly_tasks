apiVersion: v1
kind: Service
metadata:
  name: fastapi-demo-svc
  labels:
    app: fastapi-demo
spec:
  type: NodePort
  selector:
    app: fastapi-demo          # must match pod labels in Deployment
  ports:
    - name: http
      protocol: TCP
      port: 80                 # Service port (cluster-internal)
      targetPort: 8000         # container port
      nodePort: 30080          # external port on the Node (30000-32767)
